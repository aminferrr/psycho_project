name: psychologist_app
description: A Flutter application for mental health support

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  fl_chart: ^0.68.0


  firebase_core: ^4.2.0
  firebase_auth: ^6.1.1
  cloud_firestore: ^6.0.3
  firebase_storage: ^13.0.3

  google_sign_in: ^7.2.0
  provider: ^6.1.1
  intl: ^0.18.1
  uuid: ^4.2.1
  http: ^1.2.0
  flutter_dotenv: ^5.1.0
  image_picker: ^1.0.4
  audioplayers: ^6.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  fake_cloud_firestore: ^4.0.1
  mocktail: ^1.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "web/icons/iconforapp.jpg"


flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/emotions/
    - assets/sounds/
    - assets/wallpapers/
